<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WI Monopoly" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" content="#0b1220" />
    <title>Wiesbaden Monopoly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --safe-top:    env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left:   env(safe-area-inset-left, 0px);
        --safe-right:  env(safe-area-inset-right, 0px);

        /* Warm cream palette */
        --bg:        #e8e0d0;
        --surface:   #ffffff;
        --surface2:  #f5f0e6;
        --tile-bg:   #faf6ed;
        --border:    #d0c4aa;
        --border2:   #b8aa90;
        --text:      #1a1510;
        --text2:     #6b5a42;
        --text3:     #9e8e78;
        --accent:    #e8357a;
        --green:     #16884a;
        --teal:      #0e9880;
        --gold:      #c47d0a;
        --red:       #c42828;
        --blue:      #2252c8;
        --board-bg:  #1a5c2e;
        --board-mid: #1e6a34;
        --shadow:    rgba(80, 60, 30, 0.18);
        --shadow-lg: rgba(80, 60, 30, 0.28);
      }

      html { height: 100%; }
      body {
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100%;
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      #root { width: 100%; min-height: 100dvh; }
      input, button, select { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      /* ── Animations ─────────────────────────────────────────────── */
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.92) translateY(6px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes popIn {
        0%   { opacity: 0; transform: scale(0.7); }
        65%  { transform: scale(1.05); }
        85%  { transform: scale(0.97); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideLeft {
        from { opacity: 0; transform: translateX(20px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes tokenLand {
        0%   { transform: scale(1) translateY(0); }
        25%  { transform: scale(1.6) translateY(-7px); }
        55%  { transform: scale(0.88) translateY(0); }
        75%  { transform: scale(1.12); }
        100% { transform: scale(1); }
      }
      @keyframes diceShake {
        0%,100% { transform: rotate(0deg) scale(1); }
        15%  { transform: rotate(-15deg) scale(1.12); }
        35%  { transform: rotate(12deg)  scale(0.94); }
        55%  { transform: rotate(-8deg)  scale(1.06); }
        75%  { transform: rotate(5deg)   scale(0.98); }
      }
      @keyframes tileGlow {
        0%,100% { box-shadow: 0 0 0 2px rgba(232,53,122,0.5); }
        50%     { box-shadow: 0 0 0 4px rgba(232,53,122,0.25), 0 0 16px rgba(232,53,122,0.2); }
      }
      @keyframes jackpotPulse {
        0%,100% { color: var(--gold); }
        50%     { color: #f5a020; text-shadow: 0 0 14px rgba(245,160,32,0.55); }
      }
      @keyframes glowPulse {
        0%,100% { box-shadow: 0 4px 20px var(--shadow); }
        50%     { box-shadow: 0 4px 30px rgba(22,136,74,0.35), 0 0 0 3px rgba(22,136,74,0.15); }
      }
      @keyframes pulse {
        0%,100% { opacity: 1; }
        50%     { opacity: 0.55; }
      }
      @keyframes shimmer {
        from { background-position: -200% center; }
        to   { background-position: 200% center; }
      }
      @keyframes bounceIn {
        0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
        60%  { transform: scale(1.2) rotate(3deg); }
        80%  { transform: scale(0.92); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes eventShow {
        0%   { opacity: 0; transform: translateY(-10px) scale(0.95); }
        8%   { opacity: 1; transform: translateY(2px) scale(1.03); }
        14%  { transform: translateX(-5px) scale(1); }
        20%  { transform: translateX(5px); }
        26%  { transform: translateX(-3px); }
        32%  { transform: translateX(3px); }
        38%  { transform: translateX(0); }
        78%  { opacity: 1; transform: translateX(0); }
        100% { opacity: 0; transform: translateY(-4px); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
